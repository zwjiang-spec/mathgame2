<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>好玩的數學</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      :root {
        --bg-main: #fdf5e6;
        --text-dark: #1c2833;
        --text-gray: #95a5a6;
        --color-gold: #e67e22;
        --btn-white: #ffffff;
        --btn-blue-bg: #fbeee6;
        --btn-blue-text: #d35400;
        --btn-del-bg: #fae5e5;
        --btn-del-text: #c0392b;
        --btn-sqrt-bg: #fdedec;
        --btn-sqrt-text: #e67e22;
        --btn-enter-bg: #d35400;
        --btn-enter-text: #ffffff;
      }
      #keypad {
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(5, min(11vh, 55px));
        gap: 8px;
      }
      .key-enter {
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <div id="toast">答案提示區</div>
    <div id="death-screen">
      <h1>💀 你已經死了</h1>
      <p>分數過低 (-20分)，請重新再來</p>
      <div
        id="death-error-log"
        style="
          background: rgba(255, 255, 255, 0.9);
          padding: 15px;
          border-radius: 10px;
          color: black;
          max-width: 90%;
          margin-top: 15px;
        "
      ></div>
      <button
        class="action-btn"
        onclick="location.reload()"
        style="margin-top: 20px; background: #555"
      >
        重新開始
      </button>
      <a href="index.html" style="color: #ccc; margin-top: 15px"
        >🏠 回到數學天地主選單</a
      >
    </div>

    <div id="overlay">
      <a
        href="index.html"
        class="home-btn"
        style="position: absolute; top: 15px; left: 15px"
        >🏠 回主選單</a
      >

      <h1 style="color: #d35400; margin-bottom: 10px; margin-top: 50px">
        🔥 綜合練習模式
      </h1>
      <div
        id="start-ui-group"
        style="
          display: flex;
          flex-direction: column;
          align-items: center;
          width: 100%;
        "
      >
        <p style="color: #7f8c8d; font-size: 16px; margin-bottom: 30px">
          題庫已混合！準備好迎接全方位的挑戰了嗎？
        </p>
        <button class="action-btn" onclick="startGame()">START PRACTICE</button>
      </div>

      <h2
        id="final-score-text"
        class="hidden"
        style="color: var(--color-gold); margin-top: -10px; margin-bottom: 10px"
      ></h2>
      <div
        id="end-error-log"
        class="hidden"
        style="
          background: #fffdf5;
          border: 2px dashed #e74c3c;
          padding: 15px;
          border-radius: 10px;
          max-width: 90%;
          margin: 0 auto 20px;
        "
      ></div>

      <div
        id="end-ui-group"
        class="hidden"
        style="
          display: flex;
          flex-direction: column;
          align-items: center;
          width: 100%;
          margin-top: 10px;
        "
      >
        <p
          style="
            color: #c0392b;
            font-size: 16px;
            margin-bottom: 20px;
            font-weight: bold;
          "
        >
          練習結束！這是你的錯題總整理：
        </p>
        <button
          class="action-btn"
          onclick="location.reload()"
          style="background: #555; margin-bottom: 15px"
        >
          再玩一局 (重新開始)
        </button>
        <a
          href="index.html"
          style="
            color: #666;
            text-decoration: none;
            font-weight: bold;
            margin-top: 5px;
          "
          >🏠 回到數學天地主選單</a
        >
      </div>
    </div>

    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="header">
      <div class="stat-group">
        <div class="stat-label">MODE</div>
        <div class="stat-value" style="font-size: 16px; color: #d35400">
          練習
        </div>
      </div>
      <div class="stat-group">
        <div class="stat-label">TIME</div>
        <div id="ui-time" class="stat-value" style="color: #e74c3c">90</div>
      </div>
      <div
        class="stat-group"
        style="
          flex-direction: row;
          justify-content: center;
          align-items: center;
          gap: 10px;
        "
      >
        <button
          onclick="if(confirm('確定要放棄這局遊戲並返回主選單嗎？')) location.href='index.html'"
          style="
            background: #fae5e5;
            color: #c0392b;
            border: 1px solid #e74c3c;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            padding: 4px 8px;
            cursor: pointer;
            box-shadow: 0 2px 4px rgba(231, 76, 60, 0.2);
            white-space: nowrap;
          "
        >
          🚪 退出
        </button>

        <div style="display: flex; flex-direction: column; align-items: center">
          <div class="stat-label">SCORE</div>
          <div id="ui-score" class="stat-value">0</div>
        </div>
      </div>
    </div>

    <div id="combo-gauge-wrapper">
      <div class="combo-label">COMBO</div>
      <div id="combo-gauge-bg"><div id="combo-gauge-fill"></div></div>
      <div id="combo-gauge-text">0</div>
    </div>
    <div id="phase-indicator">🎲 隨機題庫抽取中</div>

    <div id="display-area">
      <div id="question-text" style="font-size: 20px; color: var(--text-gray)">
        題目讀取中...
      </div>
      <div
        style="
          display: flex;
          justify-content: center;
          align-items: center;
          gap: 12px;
          margin-top: 15px;
          margin-bottom: 5px;
        "
      >
        <div id="input-box" style="margin-top: 0; min-width: 120px"></div>
        <button
          onclick="skipQuestion()"
          style="
            background: #ffefd5;
            color: #d35400;
            border: 2px solid #f39c12;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            padding: 6px 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(243, 156, 18, 0.2);
            white-space: nowrap;
            transition: 0.1s;
          "
        >
          PASS<br /><span style="font-size: 11px">(-20分)</span>
        </button>
      </div>
    </div>

    <div id="keypad-container">
      <div id="keypad"></div>
    </div>

    <script src="common.js"></script>
    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const selectedModesStr = urlParams.get("modes");
      const activeModes = selectedModesStr
        ? selectedModesStr.split(",")
        : ["trig", "space"];

      const trigMap = {
        0: { sin: "0", cos: "1", tan: "0" },
        30: { sin: "1/2", cos: "√3/2", tan: "√3/3" },
        45: { sin: "√2/2", cos: "√2/2", tan: "1" },
        60: { sin: "√3/2", cos: "1/2", tan: "√3" },
        90: { sin: "1", cos: "0" },
        120: { sin: "√3/2", cos: "-1/2", tan: "-√3" },
        135: { sin: "√2/2", cos: "-√2/2", tan: "-1" },
        150: { sin: "1/2", cos: "-√3/2", tan: "-√3/3" },
        180: { sin: "0", cos: "-1", tan: "0" },
        210: { sin: "-1/2", cos: "-√3/2", tan: "√3/3" },
        225: { sin: "-√2/2", cos: "-√2/2", tan: "1" },
        240: { sin: "-√3/2", cos: "-1/2", tan: "√3" },
        270: { sin: "-1", cos: "0" },
        300: { sin: "-√3/2", cos: "1/2", tan: "-√3" },
        315: { sin: "-√2/2", cos: "√2/2", tan: "-1" },
        330: { sin: "-1/2", cos: "√3/2", tan: "-√3/3" },
      };
      const baseAngles = Object.keys(trigMap).map(Number);
      const funcs = ["sin", "cos", "tan"];
      const permQuestions = [
        { q: "4!", a: "24", hint: "4 × 3 × 2 × 1", level: 1 },
        { q: "5!", a: "120", hint: "5 × 4 × 3 × 2 × 1", level: 1 },
        { q: "0!", a: "1", hint: "0的階乘規定為 1 哦！", level: 1 },
        { q: "P(5,2)", a: "20", hint: "從5往下乘 2 個數：5 × 4", level: 1 },
        { q: "C(5,2)", a: "10", hint: "P(5,2) 除以 2! ➡ (5×4)/2", level: 1 },
        {
          q: "C(10,8)",
          a: "45",
          hint: "數字太大用扣的！C(10,8) = C(10,2) = 45",
          level: 1,
        },
        {
          q: "5人選3人 排成一列",
          a: "60",
          hint: "順序有差用 P ➡ P(5,3) = 5×4×3",
          level: 2,
        },
        {
          q: "5人選3人 組委員會",
          a: "10",
          hint: "順序沒差用 C ➡ C(5,3) = C(5,2) = 10",
          level: 2,
        },
        {
          q: "3封不同信 投入2個郵筒",
          a: "8",
          hint: "信去選郵筒！ 2 × 2 × 2 = 2³ = 8",
          level: 2,
        },
        {
          q: "甲乙丙丁4人排，甲乙 相鄰",
          a: "12",
          hint: "甲乙綁一起當1人 ➡ 3! × 2! = 12",
          level: 3,
        },
        {
          q: "甲乙丙丁4人排，甲乙 不相鄰",
          a: "12",
          hint: "丙丁先排，甲乙插空隙 ➡ 2! × P(3,2) = 12",
          level: 3,
        },
        {
          q: "AABB 排成一列",
          a: "6",
          hint: "不盡相異物排列 ➡ 4! / (2!2!) = 6",
          level: 3,
        },
        {
          q: "AAAB 排成一列",
          a: "4",
          hint: "不盡相異物排列 ➡ 4! / 3! = 4",
          level: 3,
        },
        {
          q: "4個相同蘋果 分給3人(可不分)",
          a: "15",
          hint: "重複組合 H(3,4) = C(6,4) = 15",
          level: 4,
        },
        {
          q: "x + y = 5 的 非負整數解",
          a: "6",
          hint: "等於分5個蘋果給2人 ➡ H(2,5) = C(6,5) = 6",
          level: 4,
        },
        {
          q: "x + y = 5 的 正整數解",
          a: "4",
          hint: "先各發1個，剩3個分給2人 ➡ H(2,3) = C(4,3) = 4",
          level: 4,
        },
        {
          q: "x + y + z = 4 的 非負整數解",
          a: "15",
          hint: "H(3,4) = C(6,4) = 15",
          level: 4,
        },
        {
          q: "x + y + z = 5 的 正整數解",
          a: "6",
          hint: "先各發1個，剩2個分給3人 ➡ H(3,2) = C(4,2) = 6",
          level: 4,
        },
        {
          q: "x + y + z = 6 的 正整數解",
          a: "10",
          hint: "先各發1個，剩3個分給3人 ➡ H(3,3) = C(5,3) = 10",
          level: 4,
        },
      ];

      function generateGridQuestions() {
        function C(n, k) {
          if (k < 0 || k > n) return 0;
          if (k === 0 || k === n) return 1;
          let res = 1;
          for (let i = 1; i <= k; i++) res = (res * (n - i + 1)) / i;
          return res;
        }
        for (let n = 1; n <= 5; n++) {
          for (let m = 1; m <= 5; m++) {
            if (n === 1 && m === 1) continue;
            let ans = C(n + m, n);
            let lvl = n + m <= 5 ? 2 : 3;
            let s = 30;
            let w = n * s;
            let h = m * s;
            let pathD = "";
            for (let i = 0; i <= m; i++) pathD += `M0,${i * s} H${w} `;
            for (let i = 0; i <= n; i++) pathD += `M${i * s},0 V${h} `;

            let svgStr =
              `<div style='text-align: center; margin: 8px 0;'>` +
              `<svg viewBox='-25 -25 ${w + 50} ${
                h + 50
              }' style='height: 90px; max-height: 12vh; width: auto; max-width: 100%;'>` +
              `<path d='${pathD}' stroke='#34495e' stroke-width='3' fill='none'/>` +
              `<circle cx='0' cy='${h}' r='6' fill='#e74c3c'/>` +
              `<text x='-20' y='${
                h + 20
              }' fill='#e74c3c' font-weight='bold' font-size='20'>A</text>` +
              `<circle cx='${w}' cy='0' r='6' fill='#27ae60'/>` +
              `<text x='${
                w + 8
              }' y='-6' fill='#27ae60' font-weight='bold' font-size='20'>B</text>` +
              `</svg></div>`;

            permQuestions.push({
              q: `由 A 到 B 取捷徑${svgStr}`,
              a: ans.toString(),
              hint: `${n}右${m}上 ➡ ${n + m}! / (${n}!${m}!) = ${ans}`,
              level: lvl,
            });
          }
        }
      }
      generateGridQuestions();
      function formatRoot(d2) {
        let root = Math.sqrt(d2);
        if (Number.isInteger(root)) return root.toString();
        return `√${d2}`;
      }

      let score = 0,
        combo = 0,
        consecutiveWrong = 0,
        targetAns = "",
        userInput = "",
        currentQuestionStr = "";
      let isCoordinateAns = false;
      let currentHint = ""; // ✨ 新增的提示變數

      let currentQuestionErrors = 0,
        currentMultiplier = 1;
      let timer,
        startTime,
        lastTickSec = -1;
      const TIME_LIMIT = 90;

      let correctQuestionsSet = new Set();
      let errorLogMap = new Map();
      let activeWrongPool = [];

      function getNewQuestion() {
        let remain = startTime
          ? TIME_LIMIT - (Date.now() - startTime) / 1000
          : TIME_LIMIT;
        let phaseStr = "",
          loop = 0,
          spacePool = [];

        if (remain <= 30) {
          currentMultiplier = 2;
          phaseStr = "🔥 狂熱時間 (全難度解禁, 分數 x2)";
          loop = Math.floor(Math.random() * 5) - 2;
          spacePool = [1, 2, 3];
          document.getElementById("phase-indicator").style.color = "#c0392b";
        } else if (consecutiveWrong >= 2) {
          currentMultiplier = 1;
          phaseStr = "🌱 基礎保底 (幫你找回手感)";
          loop = 0;
          spacePool = [1];
          document.getElementById("phase-indicator").style.color = "#27ae60";
        } else if (combo >= 3) {
          currentMultiplier = 1;
          phaseStr = "⚡ 乘勝追擊 (連擊進階挑戰！)";
          loop = Math.floor(Math.random() * 3) - 1;
          spacePool = [2, 3];
          document.getElementById("phase-indicator").style.color = "#d68910";
        } else if (score >= 100) {
          currentMultiplier = 1;
          phaseStr = "⚡ 進階階段 (分數達標難度提升)";
          loop = Math.floor(Math.random() * 2) - 1;
          spacePool = [1, 2];
          document.getElementById("phase-indicator").style.color = "#d68910";
        } else {
          currentMultiplier = 1;
          phaseStr = `🌱 基礎階段 (連對3題進階)`;
          loop = 0;
          spacePool = [1];
          document.getElementById("phase-indicator").style.color = "#27ae60";
        }

        let lastQ = currentQuestionStr;
        let availableWrong = activeWrongPool.filter((item) => item.q !== lastQ);
        if (availableWrong.length > 0 && Math.random() < 0.4) {
          let idx = Math.floor(Math.random() * availableWrong.length);
          currentQuestionStr = availableWrong[idx].q;
          targetAns = availableWrong[idx].a;
          isCoordinateAns = availableWrong[idx].isC;
          currentHint = availableWrong[idx].hint;
          document.getElementById("phase-indicator").innerText = phaseStr;
          document.getElementById(
            "question-text"
          ).innerHTML = `${currentQuestionStr} =`;
          userInput = "";
          currentQuestionErrors = 0;
          renderInput();
          return;
        }

        document.getElementById("phase-indicator").innerText = phaseStr;
        const currentTopic =
          activeModes[Math.floor(Math.random() * activeModes.length)];

        if (currentTopic === "trig") {
          isCoordinateAns = false;
          let valid = false,
            attempts = 0;
          let func, baseAngle, realAngle;
          while (!valid && attempts < 100) {
            func = funcs[Math.floor(Math.random() * 3)];
            baseAngle =
              baseAngles[Math.floor(Math.random() * baseAngles.length)];
            if (trigMap[baseAngle][func] !== undefined) {
              realAngle = baseAngle + loop * 360;
              let tempQ = `<span style="font-size:14px; color:#27ae60;">[三角]</span><br>${func} ${realAngle}°`;
              if (!correctQuestionsSet.has(tempQ) && tempQ !== lastQ) {
                valid = true;
                currentQuestionStr = tempQ;
                targetAns = trigMap[baseAngle][func];
              }
            }
            attempts++;
          }
          if (!valid) {
            realAngle = baseAngle + loop * 360;
            currentQuestionStr = `<span style="font-size:14px; color:#27ae60;">[三角]</span><br>${func} ${realAngle}°`;
            targetAns = trigMap[baseAngle][func];
          }

          let modAngle = ((realAngle % 360) + 360) % 360;
          let h = "";
          if (realAngle !== modAngle) h += `同界角 ${modAngle}°。 `;
          if (
            modAngle === 0 ||
            modAngle === 90 ||
            modAngle === 180 ||
            modAngle === 270
          ) {
            h += `象限角，看單位圓坐標。`;
          } else {
            let quad, ref, sign;
            if (modAngle < 90) {
              quad = "一";
              ref = modAngle;
              sign = "正";
            } else if (modAngle < 180) {
              quad = "二";
              ref = 180 - modAngle;
              sign = func === "sin" ? "正" : "負";
            } else if (modAngle < 270) {
              quad = "三";
              ref = modAngle - 180;
              sign = func === "tan" ? "正" : "負";
            } else {
              quad = "四";
              ref = 360 - modAngle;
              sign = func === "cos" ? "正" : "負";
            }
            h += `第${quad}象限 (${func}為${sign})，參考角 ${ref}°。`;
          }
          currentHint = h;
        } else if (currentTopic === "space") {
          let valid = false,
            attempts = 0,
            selectedQ = null;
          let kwProj = `<strong style="color: #e74c3c; font-size: 1.1em;">投影點</strong>`;
          let kwSymm = `<strong style="color: #2980b9; font-size: 1.1em;">對稱點</strong>`;
          let kwDist = `<strong style="color: #d68910; font-size: 1.1em;">距離</strong>`;
          while (!valid && attempts < 100) {
            let x = 0,
              y = 0,
              z = 0;
            while (x === 0 && y === 0 && z === 0) {
              x = Math.floor(Math.random() * 11) - 5;
              y = Math.floor(Math.random() * 11) - 5;
              z = Math.floor(Math.random() * 11) - 5;
            }
            let questions = [];
            let p = `P(${x},${y},${z})`;
            if (spacePool.includes(1)) {
              questions.push({
                q: `${p} 在 xy平面的${kwProj}`,
                a: `(${x},${y},0)`,
                isC: true,
                hint: "投影到xy平面，未出現的 z 變成 0",
              });
              questions.push({
                q: `${p} 在 yz平面的${kwProj}`,
                a: `(0,${y},${z})`,
                isC: true,
                hint: "投影到yz平面，未出現的 x 變成 0",
              });
              questions.push({
                q: `${p} 在 zx平面的${kwProj}`,
                a: `(${x},0,${z})`,
                isC: true,
                hint: "投影到zx平面，未出現的 y 變成 0",
              });
              questions.push({
                q: `${p} 對 xy平面的${kwSymm}`,
                a: `(${x},${y},${-z})`,
                isC: true,
                hint: "對稱於xy平面，未出現的 z 變號",
              });
              questions.push({
                q: `${p} 對 yz平面的${kwSymm}`,
                a: `(${-x},${y},${z})`,
                isC: true,
                hint: "對稱於yz平面，未出現的 x 變號",
              });
              // ✨ 就是下一行引發的 Bug！已修復為 p
              questions.push({
                q: `${p} 對 zx平面的${kwSymm}`,
                a: `(${x},${-y},${z})`,
                isC: true,
                hint: "對稱於zx平面，未出現的 y 變號",
              });
              questions.push({
                q: `${p} 到 xy平面的${kwDist}`,
                a: `${Math.abs(z)}`,
                isC: false,
                hint: "到xy平面的距離，就是 z 的絕對值",
              });
              questions.push({
                q: `${p} 到 yz平面的${kwDist}`,
                a: `${Math.abs(x)}`,
                isC: false,
                hint: "到yz平面的距離，就是 x 的絕對值",
              });
              questions.push({
                q: `${p} 到 zx平面的${kwDist}`,
                a: `${Math.abs(y)}`,
                isC: false,
                hint: "到zx平面的距離，就是 y 的絕對值",
              });
            }
            if (spacePool.includes(2)) {
              questions.push({
                q: `${p} 在 x軸的${kwProj}`,
                a: `(${x},0,0)`,
                isC: true,
                hint: "投影到x軸，只有 x 保留，y,z 皆為 0",
              });
              questions.push({
                q: `${p} 在 y軸的${kwProj}`,
                a: `(0,${y},0)`,
                isC: true,
                hint: "投影到y軸，只有 y 保留，x,z 皆為 0",
              });
              questions.push({
                q: `${p} 在 z軸的${kwProj}`,
                a: `(0,0,${z})`,
                isC: true,
                hint: "投影到z軸，只有 z 保留，x,y 皆為 0",
              });
              questions.push({
                q: `${p} 對 x軸的${kwSymm}`,
                a: `(${x},${-y},${-z})`,
                isC: true,
                hint: "對稱於x軸，除了 x 以外，y,z 皆變號",
              });
              questions.push({
                q: `${p} 對 y軸的${kwSymm}`,
                a: `(${-x},${y},${-z})`,
                isC: true,
                hint: "對稱於y軸，除了 y 以外，x,z 皆變號",
              });
              questions.push({
                q: `${p} 對 z軸的${kwSymm}`,
                a: `(${-x},${-y},${z})`,
                isC: true,
                hint: "對稱於z軸，除了 z 以外，x,y 皆變號",
              });
              questions.push({
                q: `${p} 對 原點的${kwSymm}`,
                a: `(${-x},${-y},${-z})`,
                isC: true,
                hint: "對稱於原點，x,y,z 全部變號",
              });
            }
            if (spacePool.includes(3)) {
              questions.push({
                q: `${p} 到 x軸的${kwDist}`,
                a: formatRoot(y * y + z * z),
                isC: false,
                hint: "到x軸的距離 = √(y² + z²)",
              });
              questions.push({
                q: `${p} 到 y軸的${kwDist}`,
                a: formatRoot(x * x + z * z),
                isC: false,
                hint: "到y軸的距離 = √(x² + z²)",
              });
              questions.push({
                q: `${p} 到 z軸的${kwDist}`,
                a: formatRoot(x * x + y * y),
                isC: false,
                hint: "到z軸的距離 = √(x² + y²)",
              });
              questions.push({
                q: `${p} 到 原點的${kwDist}`,
                a: formatRoot(x * x + y * y + z * z),
                isC: false,
                hint: "到原點的距離 = √(x² + y² + z²)",
              });
            }

            selectedQ = questions[Math.floor(Math.random() * questions.length)];
            let tempQ = `<span style="font-size:14px; color:#8e44ad;">[空間]</span><br>${selectedQ.q}`;
            if (!correctQuestionsSet.has(tempQ) && tempQ !== lastQ) {
              valid = true;
              currentQuestionStr = tempQ;
              targetAns = selectedQ.a;
              isCoordinateAns = selectedQ.isC;
              currentHint = selectedQ.hint;
            }
            attempts++;
          }
          // ✨ 萬一題庫卡死，直接保底給一題，絕對不會再發生「讀取中」
          if (!valid && selectedQ) {
            currentQuestionStr = `<span style="font-size:14px; color:#8e44ad;">[空間]</span><br>${selectedQ.q}`;
            targetAns = selectedQ.a;
            isCoordinateAns = selectedQ.isC;
            currentHint = selectedQ.hint;
          }
        } else if (currentTopic === "perm") {
          isCoordinateAns = false;
          let allowedLevels = [];
          if (remain <= 30) allowedLevels = [1, 2, 3, 4];
          else if (consecutiveWrong >= 2) allowedLevels = [1];
          else if (score >= 100) allowedLevels = [3, 4];
          else if (combo >= 3) allowedLevels = [2, 3];
          else allowedLevels = [1];

          let valid = false,
            attempts = 0,
            sq = null;
          while (!valid && attempts < 100) {
            let pool = permQuestions.filter((q) =>
              allowedLevels.includes(q.level)
            );
            if (pool.length === 0) pool = permQuestions;
            sq = pool[Math.floor(Math.random() * pool.length)];
            let tempQ = `<span style="font-size:14px; color:#16a085;">[排列]</span><br>${sq.q}`;
            if (!correctQuestionsSet.has(tempQ) && tempQ !== lastQ) {
              valid = true;
              currentQuestionStr = tempQ;
              targetAns = sq.a;
              currentHint = sq.hint;
            }
            attempts++;
          }
          // ✨ 排列組合保底防呆
          if (!valid && sq) {
            currentQuestionStr = `<span style="font-size:14px; color:#16a085;">[排列]</span><br>${sq.q}`;
            targetAns = sq.a;
            currentHint = sq.hint;
          }
        }

        document.getElementById(
          "question-text"
        ).innerHTML = `${currentQuestionStr} =`;
        userInput = "";
        currentQuestionErrors = 0;
        renderInput();
      }

      function renderInput() {
        const box = document.getElementById("input-box");
        let displayHTML = formatMathHTML(userInput);
        if (isCoordinateAns) {
          if (userInput === "")
            box.innerHTML = `<span style="color: #bdc3c7; opacity: 0.6;">( x , y , z )</span>`;
          else box.innerHTML = `( ${displayHTML} )`;
        } else {
          box.innerHTML = displayHTML;
        }
        box.classList.remove("error-text", "correct-flash");
      }
      function input(val) {
        if (val === "DEL") userInput = userInput.slice(0, -1);
        else userInput += val;
        renderInput();
      }

      function generateErrorLogHTML() {
        if (errorLogMap.size === 0)
          return "<h3 style='color:#27ae60; margin:0;'>🌟 太完美了！無錯題通關！</h3>";
        let html =
          "<h3 style='color:#c0392b; margin: 0 0 10px 0;'>📝 你的專屬錯題本：</h3><ul style='text-align:left; font-size:15px; color:#444; margin:0; padding-left:20px;'>";
        errorLogMap.forEach((data, qStr) => {
          let cleanQ = qStr
            .replace("[三角]", "📐 ")
            .replace("[空間]", "🚀 ")
            .replace("[排列]", "🎲 ");
          html += `<li style="margin-bottom:10px; line-height:1.4;">${cleanQ} <br><span style="color:#e67e22; font-weight:bold;">➡ 正解: ${data.ans}</span><br><span style="color:#7f8c8d; font-size:13px;">💡 提示: ${data.hint}</span></li>`;
        });
        return html + "</ul>";
      }

      function checkDeath() {
        if (score < -20) {
          clearInterval(timer);
          document.getElementById("death-error-log").innerHTML =
            generateErrorLogHTML();
          document.getElementById("death-screen").classList.add("show");
          document.getElementById("keypad-container").style.display = "none";
        }
      }

      function triggerErrorEffect(isSkip = false) {
        playWrong();
        combo = 0;
        consecutiveWrong++;

        let displayAns = isCoordinateAns
          ? `( ${formatMathHTML(targetAns)} )`
          : formatMathHTML(targetAns);
        errorLogMap.set(currentQuestionStr, {
          ans: displayAns,
          hint: currentHint,
        });
        if (!activeWrongPool.some((item) => item.q === currentQuestionStr)) {
          activeWrongPool.push({
            q: currentQuestionStr,
            a: targetAns,
            isC: isCoordinateAns,
            hint: currentHint,
          });
        }

        const area = document.getElementById("display-area");
        area.classList.remove("shake-animation");
        void area.offsetWidth;
        area.classList.add("shake-animation");
        currentQuestionErrors++;
        score -= currentQuestionErrors * 5 * currentMultiplier;
        document.getElementById("input-box").classList.add("error-text");
        flashScoreRed();
        updateUI();
        if (isSkip) showToast(`⏭️ 跳過！正解為：${displayAns}`, 2500);
        else showToast(`❌ 答錯囉！請再試一次！`, 1200);
        checkDeath();
      }

      function submitAnswer() {
        if (userInput === "") return;
        const box = document.getElementById("input-box");
        if (
          box.classList.contains("correct-flash") ||
          box.classList.contains("error-text")
        )
          return;
        let isCorrect = false;
        if (isCoordinateAns) {
          let cleanUser = userInput.replace(/[\s\(\)]/g, "");
          let cleanTarget = targetAns.replace(/[\s\(\)]/g, "");
          isCorrect = cleanUser === cleanTarget;
        } else {
          let userVal = evalMath(userInput);
          let targetVal = evalMath(targetAns);
          isCorrect =
            !isNaN(userVal) &&
            !isNaN(targetVal) &&
            Math.abs(userVal - targetVal) < 1e-5;
        }

        if (isCorrect) {
          correctQuestionsSet.add(currentQuestionStr);
          activeWrongPool = activeWrongPool.filter(
            (item) => item.q !== currentQuestionStr
          );
          spawnComboParticle();
          consecutiveWrong = 0;
          if (combo >= 9) playFeverCorrect();
          else playCorrect();
          box.classList.add("correct-flash");
          score += (10 + combo * 2) * currentMultiplier;
          combo++;
          if (combo > 5) {
            const body = document.body;
            body.classList.remove("strong-shake-effect");
            void body.offsetWidth;
            body.classList.add("strong-shake-effect");
          }
          updateUI();
          setTimeout(getNewQuestion, 150);
        } else {
          triggerErrorEffect();
        }
      }

      function skipQuestion() {
        if (!document.getElementById("overlay").classList.contains("hidden"))
          return;
        triggerErrorEffect(true);
        score -=
          20 * currentMultiplier -
          currentQuestionErrors * 5 * currentMultiplier;
        updateUI();
        checkDeath();
        setTimeout(getNewQuestion, 450);
      }

      function updateUI() {
        document.getElementById("ui-score").innerText = score;
        const comboFill = document.getElementById("combo-gauge-fill");
        const comboText = document.getElementById("combo-gauge-text");
        const inputBox = document.getElementById("input-box");
        let fillPercent = Math.min((combo / 10) * 100, 100);
        comboFill.style.width = fillPercent + "%";
        comboText.classList.remove("bump-anim");
        void comboText.offsetWidth;
        if (combo > 0) comboText.classList.add("bump-anim");
        if (combo === 0) {
          comboText.innerHTML = "0";
          comboText.style.color = "var(--text-gray)";
          comboFill.classList.remove("fever-fill");
          inputBox.classList.remove("fever-box");
        } else if (combo < 10) {
          comboText.innerHTML = `${combo} <span style="font-size:14px">🔥</span>`;
          comboText.style.color = "#d35400";
          comboFill.classList.remove("fever-fill");
          inputBox.classList.remove("fever-box");
        } else {
          comboText.innerHTML = `<span class="fever-text">${combo} FEVER</span>`;
          comboFill.classList.add("fever-fill");
          inputBox.classList.add("fever-box");
        }
      }

      function startGame() {
        window.scrollTo(0, 0);
        initAudio();
        document.getElementById("overlay").classList.add("hidden");
        document.getElementById("death-screen").classList.remove("show");
        document.getElementById("keypad-container").style.display = "block";
        document
          .getElementById("ui-time")
          .classList.remove("timer-danger-extreme");
        document.body.classList.remove("body-danger-flash");

        correctQuestionsSet.clear();
        errorLogMap.clear();
        activeWrongPool = [];
        score = 0;
        combo = 0;
        consecutiveWrong = 0;
        currentQuestionErrors = 0;
        updateUI();
        startTime = Date.now();
        getNewQuestion();
        timer = setInterval(() => {
          let passed = (Date.now() - startTime) / 1000;
          let remain = TIME_LIMIT - passed;
          document.getElementById("progress-bar").style.width =
            (remain / TIME_LIMIT) * 100 + "%";
          let sec = Math.ceil(Math.max(0, remain));
          const timeEl = document.getElementById("ui-time");
          timeEl.innerText = sec;
          if (sec <= 10 && sec > 0) {
            timeEl.classList.add("timer-danger-extreme");
            document.body.classList.add("body-danger-flash");
          } else {
            timeEl.classList.remove("timer-danger-extreme");
            document.body.classList.remove("body-danger-flash");
          }
          if (sec <= 10 && sec > 0 && sec !== lastTickSec) {
            playTick();
            lastTickSec = sec;
          }
          if (remain <= 0) {
            timeEl.classList.remove("timer-danger-extreme");
            document.body.classList.remove("body-danger-flash");
            clearInterval(timer);
            endGame();
          }
        }, 50);
      }

      function endGame() {
        // --- 0. 切換 UI 群組 ---
        document.getElementById("start-ui-group").classList.add("hidden");
        document.getElementById("end-ui-group").classList.remove("hidden");

        // --- 1. 顯示結算畫面 ---
        document.getElementById("overlay").classList.remove("hidden");
        document.getElementById("final-score-text").classList.remove("hidden");
        document.getElementById(
          "final-score-text"
        ).innerText = `最終得分: ${score}`;

        // --- 2. 顯示錯題本 ---
        const endLog = document.getElementById("end-error-log");
        endLog.innerHTML = generateErrorLogHTML();
        endLog.classList.remove("hidden");
        window.scrollTo(0, 0);
      }
    </script>
  </body>
</html>
